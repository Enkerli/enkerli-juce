# Reusable cross-platform build for an enkerli-juce plugin. Each plugin repo
# calls it from a thin caller workflow:
#
#   jobs:
#     build:
#       uses: Enkerli/enkerli-juce/.github/workflows/build-plugin.yml@main
#
# It builds every desktop version the archetype emits — macOS AU/VST3/CLAP,
# Windows VST3/CLAP, Linux LV2/CLAP (+ Standalone everywhere) — proving the
# whole matrix compiles. The WebUI source lives in the music-suite monorepo, so
# it's checked out as a sibling and its deps installed (esbuild bundles it
# during the CMake build). JUCE is vendored in each plugin; enkerli-juce is the
# one submodule.
name: build-plugin

on:
  workflow_call:
    inputs:
      music-suite-ref:
        description: Branch/ref of Enkerli/music-suite to source the WebUI from.
        type: string
        default: main
      prebuild:
        description: >-
          Optional shell command run in the plugin dir before CMake (e.g. a
          plugin that regenerates its WebUI via a node script instead of the
          CMake esbuild step).
        type: string
        default: ""
      cmake-args:
        description: Extra args appended to the CMake configure step.
        type: string
        default: ""

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macOS }
          - { os: ubuntu-latest,  name: Linux }
          - { os: windows-latest, name: Windows }
    steps:
      # The plugin (with its enkerli-juce submodule + vendored JUCE).
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: plugin

      # The WebUI source. The plugin CMake reads ../music-suite/apps/<app>, so
      # music-suite must sit next to the plugin checkout.
      - name: Checkout music-suite (WebUI source)
        uses: actions/checkout@v4
        with:
          repository: Enkerli/music-suite
          ref: ${{ inputs.music-suite-ref }}
          path: music-suite

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install WebUI deps
        working-directory: music-suite
        run: npm ci

      # The CMake WebUI step calls `npx esbuild` from the build dir, which won't
      # find music-suite's local copy — install it globally so it's on PATH.
      - name: Provide esbuild globally
        run: npm install -g esbuild

      - name: Linux build dependencies (JUCE + WebKitGTK + xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libcurl4-openssl-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev xvfb

      - name: Prebuild
        if: inputs.prebuild != ''
        working-directory: plugin
        run: ${{ inputs.prebuild }}

      - name: Configure
        working-directory: plugin
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ inputs.cmake-args }}

      # Linux: JUCE's LV2 post-link step loads the .so to generate the .ttl
      # manifest, which inits GTK and needs a display — run it under xvfb.
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: plugin
        run: xvfb-run -a cmake --build build --config Release --parallel 3

      - name: Build (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        working-directory: plugin
        run: cmake --build build --config Release --parallel 3

      - name: Collect artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.name }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            plugin/build/**/*_artefacts/**/*.vst3
            plugin/build/**/*_artefacts/**/*.component
            plugin/build/**/*_artefacts/**/*.clap
            plugin/build/**/*_artefacts/**/*.lv2
            plugin/build/**/*_artefacts/**/*.app
            plugin/build/**/*_artefacts/**/*.exe
